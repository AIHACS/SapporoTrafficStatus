<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>札幌イベント交通アラート 2026</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="header-copy">
        <p class="eyebrow">Sapporo Event Traffic Watch</p>
        <h1>札幌イベント交通アラート 2026</h1>
        <p class="lead">イベント由来の地下鉄・JR・道路の混雑時間を、札幌市民向けにまとめて確認できます。</p>
      </div>
      <div class="header-panel" aria-label="データ概要">
        <span class="panel-kicker">CSVベース</span>
        <strong id="eventCount">7件</strong>
        <span>交通規制イベント</span>
      </div>
    </header>

    <main class="layout">
      <section class="toolbar" aria-label="絞り込み">
        <label class="search-box">
          <span>検索</span>
          <input id="searchInput" type="search" placeholder="イベント名・駅名・エリア">
        </label>
        <label>
          <span>月</span>
          <select id="monthFilter">
            <option value="all">すべて</option>
            <option value="2">2月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
          </select>
        </label>
        <label>
          <span>交通</span>
          <select id="modeFilter">
            <option value="all">すべて</option>
            <option value="subway">地下鉄</option>
            <option value="jr">JR</option>
            <option value="road">道路</option>
          </select>
        </label>
        <label>
          <span>規制レベル</span>
          <select id="severityFilter">
            <option value="all">すべて</option>
            <option value="超大規模">超大規模</option>
            <option value="大規模">大規模</option>
            <option value="中〜大規模">中〜大規模</option>
            <option value="中規模">中規模</option>
          </select>
        </label>
      </section>

      <section class="metrics" aria-label="サマリー">
        <article>
          <span class="metric-label">高注意イベント</span>
          <strong id="highImpactCount">0</strong>
          <span>大規模以上</span>
        </article>
        <article>
          <span class="metric-label">最頻出エリア</span>
          <strong id="topArea">大通</strong>
          <span>駅・道路影響</span>
        </article>
        <article>
          <span class="metric-label">対象交通</span>
          <strong>3系統</strong>
          <span>地下鉄 / JR / 道路</span>
        </article>
      </section>

      <div class="content-grid">
        <section class="event-list-panel" aria-label="イベント一覧">
          <div class="section-heading">
            <h2>イベント一覧</h2>
            <p id="resultCount">7件表示中</p>
          </div>
          <div id="eventList" class="event-list"></div>
        </section>

        <section class="detail-panel" aria-label="イベント詳細">
          <div id="eventDetail"></div>
        </section>
      </div>

      <section class="station-board" aria-label="駅別ラッシュ早見表">
        <div class="section-heading">
          <h2>駅別ラッシュ早見表</h2>
          <p>イベントごとの「気をつけたい駅」と時間帯</p>
        </div>
        <div id="stationBoard" class="station-grid"></div>
      </section>
    </main>

    <footer class="footer-note">
      <p>このページの混雑予測は、提供CSVと札幌市内の主要交通結節点に基づく初期ルールです。公式な運行情報・交通規制図は各イベント公式サイトや交通機関の発表を確認してください。</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
